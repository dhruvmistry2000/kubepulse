image:
  repository: us-central1-docker.pkg.dev/consumption-442810/micro-service-iam/k8s-agent
  tag: latest
  pullPolicy: IfNotPresent

# One-time registration token from dashboard "Add Cluster" tab (valid 10 minutes)
registrationToken: ""

# Your dashboard URL (e.g. https://k8s-dashboard.run.app)
dashboardUrl: ""

# Friendly name for this cluster (e.g. production, staging)
clusterName: "default"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

replicaCount: 1

nameOverride: ""
