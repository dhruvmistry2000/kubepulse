apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-dashboard-agent.fullname" . }}
  labels:
    {{- include "k8s-dashboard-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-dashboard-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-dashboard-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8s-dashboard-agent.fullname" . }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8s-dashboard-agent.fullname" . }}
                  key: REGISTRATION_TOKEN
            - name: DASHBOARD_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8s-dashboard-agent.fullname" . }}
                  key: DASHBOARD_URL
            - name: CLUSTER_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8s-dashboard-agent.fullname" . }}
                  key: CLUSTER_NAME
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8s-dashboard-agent.fullname" . }}
                  key: SECRET_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
