apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-dashboard-agent.fullname" . }}
  labels:
    {{- include "k8s-dashboard-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  REGISTRATION_TOKEN: {{ .Values.registrationToken | quote }}
  DASHBOARD_URL: {{ .Values.dashboardUrl | quote }}
  CLUSTER_NAME: {{ .Values.clusterName | quote }}
  # SECRET_KEY is empty on first install; agent receives it from dashboard after registration and holds in memory
  SECRET_KEY: ""
