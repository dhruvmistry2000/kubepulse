name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          mkdir -p .helm-output
          helm package helm/ --destination .helm-output/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy package and update index
        run: |
          cp .helm-output/*.tgz gh-pages/
          helm repo index gh-pages/ \
            --url https://dhruvmistry2000.github.io/kubepulse \
            --merge gh-pages/index.yaml 2>/dev/null || \
          helm repo index gh-pages/ \
            --url https://dhruvmistry2000.github.io/kubepulse

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "ci: release helm chart from main"
          git push