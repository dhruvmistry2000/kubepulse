name: Build & Push Agent

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "helm/**" # also trigger if helm chart changes
  schedule:
    - cron: "0 2 * * *" # every 24 hours at 2am UTC (offset from dashboard)
  workflow_dispatch:
env:  
  DOCKERHUB_USERNAME: dhruvmistry200

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          VERSION="v${{ github.run_number }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Extract metadata for tags
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/kubepulse-agent
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: echo "Agent image pushed ${{ steps.build.outputs.digest }}"
